<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Color Generator</title>
    <link rel="stylesheet" href="Style.css">
</head>
<body>
    <main>
        <h1>Random Color Generator</h1>
        <div class="color-box" id="colorbox">
        <p id="color-id">#fffff</p>
        </div>
        <button id="generateBtn">Generate Color</button>
        <button id="copyBtn">Copy Hex Code</button>
        <p id="liveRegion" class="sr-only" aria-atomic="true" aria-live="polite"></p>
    </main>
    <script src="colorgenerator.js"></script>
</body>
</html>
