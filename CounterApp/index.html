<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Counter App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <h1>Counter App </h1>
        <p id="initial-value" aria-live="polite">0</p>
        <div class="btn-group">
            <button id="decreaseBtn" aria-label="Decrease count">-</button>
            <button id="resetBtn" aria-label="Reset">Reset</button>
            <button id="increaseBtn" aria-label="Increase count">+</button>
        </div>
    </main>
 <script src="counter.js"></script>
</body>
</html>
